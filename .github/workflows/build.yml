name: Build ECB Tracker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Inject secrets into gradle.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> gradle.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> gradle.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace > gradle-test.log 2>&1 || {
            echo "Tests failed, pushing log to repo"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b ci-logs-branch
            git add gradle-test.log
            git commit -m "ci: save gradle test log [skip ci]"
            git push -u origin ci-logs-branch --force
            exit 1
          }

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECBTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

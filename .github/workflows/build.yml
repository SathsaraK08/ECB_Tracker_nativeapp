name: Build ECB Tracker APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Inject secrets into gradle.properties
        run: |
          echo "SUPABASE_URL=${{ secrets.SUPABASE_URL }}" >> gradle.properties
          echo "SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }}" >> gradle.properties
          echo "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}" >> gradle.properties

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Run unit tests
        shell: bash
        run: |
          set -o pipefail
          ./gradlew testDebugUnitTest --no-daemon --stacktrace 2>&1 | tee gradle-test.log

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ECBTracker-test-reports
          path: |
            app/build/reports/tests/testDebugUnitTest
            app/build/test-results/testDebugUnitTest
          retention-days: 30

      - name: Upload Gradle test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ECBTracker-gradle-test-log
          path: gradle-test.log
          retention-days: 30

      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ECBTracker-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
